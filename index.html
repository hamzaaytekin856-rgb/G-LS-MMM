<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>PAŞAM GÜLSÜME</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7, #ff758c);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    position: relative;
  }

  .message {
    z-index: 10;
    text-align: center;
    color: #fff;
    text-shadow: 0 2px 15px rgba(0,0,0,0.25);
    animation: pop 1.2s ease-out;
  }

  .message h1 {
    font-size: 3.2rem;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .message p {
    font-size: 1.3rem;
    opacity: 0.95;
  }

  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); }
  }

  .heart {
    position: absolute;
    bottom: -50px;
    color: #fff;
    opacity: 0.85;
    animation: floatUp linear infinite;
    pointer-events: none;
  }

  @keyframes floatUp {
    0% {
      transform: translateY(0) rotate(0deg) scale(1);
      opacity: 0.9;
    }
    100% {
      transform: translateY(-110vh) rotate(360deg) scale(1.3);
      opacity: 0;
    }
  }
</style>
</head>
<body>

  <div class="message">
    <h1>💗 seni seviyorum ümmü gülsüm 💗</h1>
    <p>LÜTFEN BANA AŞIK OL...</p>
  </div>

  <script>
    const colors = ['#ff4d6d', '#ff85a1', '#ffb3c6', '#fff0f3', '#ff758f'];

    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '❤';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.fontSize = (Math.random() * 24 + 16) + 'px';
      heart.style.color = colors[Math.floor(Math.random() * colors.length)];
      heart.style.animationDuration = (Math.random() * 4 + 4) + 's';
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 8000);
    }

    setInterval(createHeart, 250);
  </script>

</body>
</html>
